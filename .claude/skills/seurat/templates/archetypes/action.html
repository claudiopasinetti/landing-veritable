<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title><!-- SLOT: page-title → "Create Account — BrandName" --></title>
  <link rel="stylesheet" href="../preview/tokens.css">
  <style>
    /* ========================================
       ACTION PAGE — Centered Card Variant
       Wireframe: wireframes/action.md
       ======================================== */

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body, system-ui, sans-serif);
      color: var(--color-text, #1a1a1a);
      background: var(--color-surface, #f5f5f5);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: var(--space-4, 32px);
    }

    /* --- FORM CARD --- */
    .form-card {
      width: 100%;
      max-width: 440px;
      background: var(--color-bg, #fff);
      border-radius: var(--radius-lg, 16px);
      padding: var(--space-6, 64px);
      box-shadow: var(--shadow-lg, 0 8px 30px rgba(0,0,0,0.12));
    }

    /* --- HEADER --- */
    .form-header {
      text-align: center;
      margin-bottom: var(--space-5, 48px);
    }
    .form-logo {
      width: 48px; height: 48px;
      margin-inline: auto; margin-bottom: var(--space-3, 24px);
      background: var(--color-primary, #2563eb);
      border-radius: var(--radius-md, 12px);
      display: grid; place-items: center;
      color: var(--color-on-primary, #fff);
      font-size: 1.5rem; font-weight: 700;
    }
    .form-title {
      font-family: var(--font-display, var(--font-body, system-ui));
      font-size: var(--text-2xl, 1.5rem);
      font-weight: 700;
      margin-bottom: var(--space-1, 8px);
    }
    .form-subtitle {
      font-size: var(--text-sm, 0.875rem);
      color: var(--color-text-muted, #666);
    }

    /* --- FORM FIELDS --- */
    .form-fields {
      display: flex; flex-direction: column;
      gap: var(--space-3, 24px);
      margin-bottom: var(--space-4, 32px);
    }
    .field {
      display: flex; flex-direction: column;
      gap: var(--space-1, 8px);
    }
    .field-label {
      font-size: var(--text-sm, 0.875rem);
      font-weight: 500;
    }
    .field-input {
      width: 100%; height: 44px;
      padding: 0 var(--space-3, 24px);
      border: 1px solid var(--color-border, #e5e5e5);
      border-radius: var(--radius-sm, 6px);
      font-size: var(--text-base, 1rem);
      font-family: inherit;
      color: var(--color-text, #1a1a1a);
      background: var(--color-bg, #fff);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field-input:focus {
      outline: none;
      border-color: var(--color-primary, #2563eb);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--color-primary, #2563eb) 15%, transparent);
    }
    .field-input::placeholder { color: var(--color-text-muted, #999); }

    /* Error state */
    .field.error .field-input {
      border-color: var(--color-error, #ef4444);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--color-error, #ef4444) 10%, transparent);
    }
    .field-error {
      font-size: var(--text-sm, 0.875rem);
      color: var(--color-error, #ef4444);
      display: none;
    }
    .field.error .field-error { display: block; }

    /* Success state */
    .field.success .field-input { border-color: var(--color-success, #22c55e); }

    .field-hint {
      font-size: var(--text-xs, 0.75rem);
      color: var(--color-text-muted, #666);
    }

    /* Password strength (optional) */
    .password-strength {
      display: flex; gap: 4px; margin-top: 4px;
    }
    .password-strength-bar {
      flex: 1; height: 4px;
      background: var(--color-border, #e5e5e5);
      border-radius: 2px;
    }

    /* --- CHECKBOX --- */
    .field-checkbox {
      display: flex; align-items: flex-start;
      gap: var(--space-2, 16px);
    }
    .field-checkbox input {
      width: 18px; height: 18px; margin-top: 2px;
      accent-color: var(--color-primary, #2563eb);
    }
    .field-checkbox label {
      font-size: var(--text-sm, 0.875rem);
      color: var(--color-text-muted, #666);
    }
    .field-checkbox a { color: var(--color-primary, #2563eb); text-decoration: none; }

    /* --- BUTTONS --- */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 100%; height: 48px;
      border-radius: var(--radius-sm, 6px);
      font-weight: 600; font-size: var(--text-base, 1rem);
      text-decoration: none; transition: all 0.2s;
      border: none; cursor: pointer; font-family: inherit;
    }
    .btn-primary {
      background: var(--color-primary, #2563eb);
      color: var(--color-on-primary, #fff);
      margin-bottom: var(--space-3, 24px);
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:active { transform: scale(0.98); }

    /* --- DIVIDER --- */
    .divider {
      display: flex; align-items: center;
      gap: var(--space-3, 24px);
      margin-bottom: var(--space-3, 24px);
      color: var(--color-text-muted, #666);
      font-size: var(--text-sm, 0.875rem);
    }
    .divider::before, .divider::after {
      content: ''; flex: 1;
      height: 1px; background: var(--color-border, #e5e5e5);
    }

    /* --- OAUTH BUTTONS --- */
    .oauth-buttons {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: var(--space-2, 16px);
      margin-bottom: var(--space-4, 32px);
    }
    .btn-oauth {
      display: flex; align-items: center; justify-content: center;
      gap: var(--space-2, 16px);
      height: 44px;
      border: 1px solid var(--color-border, #e5e5e5);
      border-radius: var(--radius-sm, 6px);
      background: var(--color-bg, #fff);
      font-size: var(--text-sm, 0.875rem); font-weight: 500;
      cursor: pointer; transition: background 0.2s; font-family: inherit;
      color: var(--color-text, #1a1a1a);
    }
    .btn-oauth:hover { background: var(--color-surface, #f5f5f5); }

    /* --- FOOTER LINK --- */
    .form-footer {
      text-align: center;
      font-size: var(--text-sm, 0.875rem);
      color: var(--color-text-muted, #666);
    }
    .form-footer a {
      color: var(--color-primary, #2563eb);
      text-decoration: none; font-weight: 500;
    }
    .form-footer a:hover { text-decoration: underline; }

    /* --- RESPONSIVE --- */
    @media (max-width: 768px) {
      body { padding: 0; align-items: stretch; }
      .form-card {
        max-width: none;
        border-radius: 0;
        box-shadow: none;
        padding: var(--space-5, 48px) var(--space-4, 32px);
        min-height: 100vh;
        display: flex; flex-direction: column; justify-content: center;
      }
      .oauth-buttons { grid-template-columns: 1fr; }
    }

    :focus-visible { outline: 2px solid var(--color-primary, #2563eb); outline-offset: 2px; }
  </style>
</head>
<body>

  <div class="form-card">
    <div class="form-header">
      <!-- SLOT: logo -->
      <div class="form-logo" aria-hidden="true">A</div>
      <h1 class="form-title"><!-- SLOT: title -->Create your account</h1>
      <p class="form-subtitle"><!-- SLOT: subtitle -->Start your 14-day free trial. No credit card required.</p>
    </div>

    <form>
      <div class="form-fields">
        <!-- SLOT: fields -->
        <div class="field">
          <label class="field-label" for="name">Full name</label>
          <input class="field-input" type="text" id="name" placeholder="Jane Smith" autocomplete="name">
        </div>

        <div class="field">
          <label class="field-label" for="email">Email address</label>
          <input class="field-input" type="email" id="email" placeholder="jane@company.com" autocomplete="email">
        </div>

        <div class="field">
          <label class="field-label" for="password">Password</label>
          <input class="field-input" type="password" id="password" placeholder="Minimum 8 characters" autocomplete="new-password">
          <span class="field-hint">Must contain at least 8 characters, one number, and one symbol.</span>
          <div class="password-strength">
            <div class="password-strength-bar"></div>
            <div class="password-strength-bar"></div>
            <div class="password-strength-bar"></div>
            <div class="password-strength-bar"></div>
          </div>
        </div>

        <!-- Example: error state (toggle .error class) -->
        <!--
        <div class="field error">
          <label class="field-label" for="email-err">Email address</label>
          <input class="field-input" type="email" id="email-err" value="invalid-email">
          <span class="field-error">Please enter a valid email address.</span>
        </div>
        -->

        <div class="field-checkbox">
          <input type="checkbox" id="terms">
          <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
        </div>
      </div>

      <button type="submit" class="btn btn-primary"><!-- SLOT: submit-text -->Create account</button>
    </form>

    <div class="divider">or continue with</div>

    <div class="oauth-buttons">
      <!-- SLOT: oauth-providers -->
      <button class="btn-oauth">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Google
      </button>
      <button class="btn-oauth">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
        GitHub
      </button>
    </div>

    <p class="form-footer">
      <!-- SLOT: alt-action -->
      Already have an account? <a href="#">Log in</a>
    </p>
  </div>

</body>
</html>
